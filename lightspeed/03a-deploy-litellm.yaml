# The LITELLM_MASTER_KEY is LiteLLM's authentication mechanism — any client calling the proxy must pass this key as a Bearer token (Authorization: Bearer sk-litellm-lightspeed).
#
#  The flow works like this:
#
#  1. 03a-deploy-litellm.yaml — defines the master key in a Secret and injects it into the LiteLLM pod as an env var. LiteLLM's config.yaml references it via master_key: os.environ/LITELLM_MASTER_KEY, so LiteLLM requires this key on every incoming request.
#  2. 04-deploy-agenticolsconfig.yaml — the agentic-llm-credentials Secret sets OPENAI_API_KEY: sk-litellm-lightspeed (same value). The agentic operator's LLMProvider (type OpenAI) uses this secret, so when the agent calls LiteLLM it sends Authorization: Bearer sk-litellm-lightspeed.
#
#  The key value itself (sk-litellm-lightspeed) is arbitrary — it just needs to match between the two secrets. It never reaches Azure; LiteLLM authenticates to Azure separately using the service principal env vars (AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID).
#
#  Model compatibility notes:
#  - gpt-5.5 (direct OpenAI): Works. The agentic operator uses OpenAI Responses API with "custom" tool type, which only gpt-5+ supports.
#  - gpt-5 (Azure): Works but tends to be "lazy" — plans but only executes 2-3 tool calls before stopping.
#  - gpt-4.1: Does NOT work. Returns "Invalid value: 'custom'" because it doesn't support the custom tool type in the Responses API.
#  - claude-opus-4-6 (Vertex AI): Does NOT work. LiteLLM's VertexAIAnthropicConfig crashes with KeyError: 'function' when translating
#    the operator's custom tool format to Anthropic's tool format. The operator sends tools without a "function" key (Responses API format),
#    but LiteLLM expects the older Chat Completions format with tool["function"]. This is a LiteLLM translation bug.
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: openshift-lightspeed
data:
  config.yaml: |
    model_list:
      - model_name: gpt-5.5
        litellm_params:
          model: openai/gpt-5.5
          api_key: os.environ/OPENAI_DIRECT_API_KEY
      - model_name: gpt-5
        litellm_params:
          model: azure/gpt-5
          api_base: os.environ/AZURE_API_BASE
          api_version: "2025-03-01-preview"
      - model_name: claude-opus-4-6
        litellm_params:
          model: vertex_ai/claude-opus-4-6
          vertex_project: cloudability-it-gemini
          vertex_location: us-east5
          vertex_credentials: os.environ/GOOGLE_APPLICATION_CREDENTIALS

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-master-key
  namespace: openshift-lightspeed
type: Opaque
stringData:
  LITELLM_MASTER_KEY: sk-litellm-lightspeed
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-direct-api-key
  namespace: openshift-lightspeed
type: Opaque
stringData:
  api_key: <TODO>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-proxy
  namespace: openshift-lightspeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-proxy
  template:
    metadata:
      labels:
        app: litellm-proxy
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.90.2
          args:
            - "--config"
            - "/app/config.yaml"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: AZURE_API_BASE
              value: https://ols-test.openai.azure.com/
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: azure-openai-api-keys
                  key: client_id
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: azure-openai-api-keys
                  key: client_secret
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: azure-openai-api-keys
                  key: tenant_id
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: LITELLM_MASTER_KEY
            - name: OPENAI_DIRECT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-direct-api-key
                  key: api_key
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/gcp/key.json
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: gcp-credentials
              mountPath: /etc/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: gcp-credentials
          secret:
            secretName: gcp-adc-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-proxy
  namespace: openshift-lightspeed
spec:
  selector:
    app: litellm-proxy
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
