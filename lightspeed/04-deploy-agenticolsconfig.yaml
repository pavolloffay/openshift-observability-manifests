apiVersion: v1
kind: Secret
metadata:
  name: agentic-llm-credentials
  namespace: openshift-lightspeed
type: Opaque
stringData:
  OPENAI_API_KEY: sk-litellm-lightspeed
---
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: litellm
spec:
  type: OpenAI
  openAI:
    credentialsSecret:
      name: agentic-llm-credentials
    url: http://litellm-proxy.openshift-lightspeed.svc.cluster.local:4000/v1
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: litellm
  model: gpt-5.5
  maxTurns: 100
  timeouts:
    analysisSeconds: 300
    executionSeconds: 1800
    verificationSeconds: 300
---
apiVersion: agentic.openshift.io/v1alpha1
kind: ApprovalPolicy
metadata:
  name: cluster
spec:
  maxAttempts: 3
  maxConcurrentProposals: 5
  stages:
    - name: Analysis
      approval: Automatic
    - name: Execution
      approval: Automatic
    - name: Verification
      approval: Automatic
---
apiVersion: agentic.openshift.io/v1alpha1
kind: AgenticOLSConfig
metadata:
  name: cluster
spec:
  suspended: false
  audit:
    logging: Enabled
    otel:
      endpoint: dev-collector.otel-observability.svc.cluster.local:4317
      tlsMode: Insecure
